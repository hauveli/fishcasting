fishcasting:
  book:
    patterns:
      spells:
        fishcasting_spells:
          .: "Example Spells"
          congratulate: "Remove an entity from the stack, then congratulate them."
      great_spells:
        fishcasting_great_spells:
          .: "Example Great Spells"
          "congratulate/great": "Same as $(l:patterns/spells/fishcasting_spells#fishcasting:congratulate)$(action)Congratulate/$, but as a great spell."

hexcasting:
  action:
    "fishcasting:congratulate" : "Congratulate Player"
    "fishcasting:congratulate/great": "Great Congrats!"

    # use this to add shortened versions of pattern names if the full name won't fit in the ingame book
    # you don't need to add an entry for every pattern - the above value will be used as a default
    book:
      "fishcasting:congratulate": "Congratulate"

text:
  fishcasting:
    congrats: "Tell %1$s they're doing a good job!"